name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env file from secrets
        run: |
          echo "APP_MESSAGE=${{ secrets.APP_MESSAGE }}" >> .env
          echo "APP_HEALTH=${{ secrets.APP_HEALTH }}" >> .env

      - name: Confirm .env file created
        run: cat .env

      - name: Build Docker image
        run: docker build -t flask-docker-app .

      - name: Run Docker container
        run: docker run --env-file .env -p 5000:5000 -d flask-docker-app